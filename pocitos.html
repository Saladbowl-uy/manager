<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Pocitos — Saladbowl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; color: #222; min-height: 100vh; }

    .top-bar { background: #111; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
    .top-bar h1 { font-size: 1rem; font-weight: 700; letter-spacing: .02em; }
    .top-bar .top-date { font-size: .78rem; color: #aaa; }

    .action-bar { background: #1a1a1a; padding: 8px 20px; display: flex; gap: 8px; }
    .action-btn {
      flex: 1; text-align: center; padding: 9px 6px; border-radius: 8px;
      font-size: .78rem; font-weight: 600; cursor: pointer; border: 1px solid #333;
      text-decoration: none; color: #ddd; background: #2a2a2a; transition: background .15s;
    }
    .action-btn:hover { background: #383838; }
    .action-btn.stock { background: #431407; border-color: #7c2d12; color: #fed7aa; }
    .action-btn.stock:hover { background: #7c2d12; }

    .week-tabs { background: #222; display: flex; padding: 0 20px; gap: 4px; }
    .week-tab { background: none; border: none; color: #888; font-size: .8rem; font-weight: 600; padding: 10px 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
    .week-tab:hover { color: #ccc; }
    .week-tab.active { color: #f59e0b; border-bottom-color: #f59e0b; }

    .container { max-width: 820px; margin: 0 auto; padding: 20px 16px 40px; }

    .section-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #888; margin-bottom: 10px; }
    .section-label.today-label { color: #d97706; }

    .hoy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; margin-bottom: 28px; }

    .oc-card { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 5px rgba(0,0,0,.07); cursor: pointer; transition: box-shadow .15s, transform .1s; border-top: 3px solid #e5e7eb; }
    .oc-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12); transform: translateY(-1px); }
    .oc-card.hoy { border-top-color: #f59e0b; }
    .oc-card.recibida { border-top-color: #22c55e; }
    .oc-card.diferencias { border-top-color: #ef4444; }
    .oc-card .proveedor { font-size: .95rem; font-weight: 700; color: #111; margin-bottom: 4px; }
    .oc-card .oc-meta { font-size: .78rem; color: #888; margin-bottom: 8px; }
    .oc-card .items-preview { font-size: .8rem; color: #555; line-height: 1.5; }
    .oc-card .items-preview .more { color: #aaa; font-style: italic; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .7rem; font-weight: 600; }
    .badge-pendiente   { background: #fef3c7; color: #92400e; }
    .badge-recibida    { background: #d1fae5; color: #065f46; }
    .badge-diferencias { background: #fee2e2; color: #991b1b; }
    .badge-borrador    { background: #e5e7eb; color: #4b5563; }
    .badge-default     { background: #f3f4f6; color: #6b7280; }

    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 28px; }
    .day-col { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .day-col.today .day-header { background: #f59e0b; color: #fff; }
    .day-header { background: #f5f5f5; text-align: center; padding: 8px 4px 6px; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #666; }
    .day-header .day-num { display: block; font-size: 1.1rem; font-weight: 800; color: #222; margin-top: 1px; line-height: 1; }
    .day-col.today .day-header .day-num { color: #fff; }
    .day-events { padding: 6px; min-height: 60px; }
    .day-event { background: #fef3c7; border-left: 3px solid #f59e0b; border-radius: 4px; padding: 5px 6px; margin-bottom: 5px; font-size: .72rem; font-weight: 600; color: #333; cursor: pointer; transition: opacity .1s; line-height: 1.3; }
    .day-event:hover { opacity: .8; }
    .day-event.recibida { background: #d1fae5; border-left-color: #22c55e; }
    .day-event.diferencias { background: #fee2e2; border-left-color: #ef4444; }

    /* Modal OC */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .modal-header { padding: 20px 20px 14px; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; border-radius: 16px 16px 0 0; }
    .modal-header .m-proveedor { font-size: 1.15rem; font-weight: 800; color: #111; }
    .modal-header .m-meta { font-size: .82rem; color: #888; margin-top: 4px; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: #f0f0f0; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; }
    .modal-close:hover { background: #e0e0e0; }
    .modal-body { padding: 16px 20px 24px; }
    .modal-section { margin-bottom: 16px; }
    .modal-section-title { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #aaa; margin-bottom: 8px; }
    .linea-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: .85rem; }
    .linea-row:last-child { border-bottom: none; }
    .linea-producto { color: #333; flex: 1; }
    .linea-cant { font-weight: 600; color: #111; white-space: nowrap; margin-left: 12px; }
    .linea-cant.recibida { color: #16a34a; }
    .linea-cant.parcial  { color: #d97706; }
    .notas-box { background: #fffbeb; border-radius: 8px; padding: 10px 12px; font-size: .84rem; color: #555; line-height: 1.5; }

    /* Modal Stock Alert */
    .stock-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end; justify-content: center; }
    .stock-backdrop.open { display: flex; }
    .stock-sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; padding: 24px 20px 36px; box-shadow: 0 -8px 40px rgba(0,0,0,.2); }
    .stock-sheet h2 { font-size: 1.05rem; font-weight: 800; color: #111; margin-bottom: 4px; }
    .stock-sheet .stock-sub { font-size: .82rem; color: #888; margin-bottom: 20px; }
    .stock-field { margin-bottom: 14px; }
    .stock-field label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 5px; color: #333; }
    .stock-field input, .stock-field select, .stock-field textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 10px; font-size: .92rem; outline: none; background: #fff; transition: border-color .15s; }
    .stock-field input:focus, .stock-field select:focus, .stock-field textarea:focus { border-color: #f59e0b; }
    .stock-levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .level-btn { padding: 10px 6px; border: 1.5px solid #ddd; border-radius: 10px; background: #fff; font-size: .8rem; font-weight: 600; cursor: pointer; text-align: center; transition: all .15s; color: #555; }
    .level-btn.selected-poco { border-color: #f59e0b; background: #fef3c7; color: #92400e; }
    .level-btn.selected-casi { border-color: #f97316; background: #ffedd5; color: #7c2d12; }
    .level-btn.selected-sin  { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
    .btn-send-stock { width: 100%; background: #b91c1c; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background .15s; }
    .btn-send-stock:hover { background: #991b1b; }
    .btn-send-stock:disabled { background: #aaa; cursor: not-allowed; }
    .btn-cancel-stock { width: 100%; background: none; border: none; color: #999; font-size: .88rem; padding: 10px; cursor: pointer; margin-top: 4px; }

    .loader { text-align: center; padding: 60px 0; color: #aaa; font-size: .9rem; }
    .empty-day { text-align: center; padding: 10px 6px; color: #ccc; font-size: .7rem; }
    .empty-section { background: #fff; border-radius: 12px; padding: 30px; text-align: center; color: #bbb; font-size: .88rem; margin-bottom: 20px; }
    .refresh-btn { display: block; width: 100%; background: none; border: 1.5px solid #ddd; border-radius: 10px; padding: 11px; font-size: .85rem; color: #888; cursor: pointer; transition: all .15s; margin-top: 8px; }
    .refresh-btn:hover { border-color: #999; color: #444; }

    .stock-status { text-align: center; padding: 10px; border-radius: 8px; font-size: .88rem; margin-top: 10px; display: none; }
    .stock-status.ok  { display: block; background: #d1fae5; color: #065f46; }
    .stock-status.err { display: block; background: #fee2e2; color: #991b1b; }

    @media (max-width: 600px) {
      .week-grid { grid-template-columns: repeat(7, 1fr); gap: 4px; }
      .day-header { font-size: .55rem; padding: 6px 2px 4px; }
      .day-header .day-num { font-size: .95rem; }
      .day-event { font-size: .65rem; padding: 4px 4px; }
      .hoy-grid { grid-template-columns: 1fr; }
      .action-bar { gap: 6px; padding: 8px 12px; }
      .action-btn { font-size: .72rem; padding: 8px 4px; }
    }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>🥗 Saladbowl Pocitos</h1>
  <span class="top-date" id="top-date"></span>
</div>

<div class="action-bar">
  <a class="action-btn" href="index.html">+ Nueva OC</a>
  <a class="action-btn" href="recepcion.html">📦 Recepción</a>
  <button class="action-btn stock" onclick="openStockModal()">⚠️ Bajo Stock</button>
</div>

<div class="week-tabs">
  <button class="week-tab active" onclick="switchWeek(0)">Esta semana</button>
  <button class="week-tab" onclick="switchWeek(7)">Semana próxima</button>
</div>

<div class="container">
  <div id="main-content"><div class="loader">Cargando órdenes…</div></div>
  <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
</div>

<!-- Modal OC -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="m-proveedor" id="m-proveedor"></div>
      <div class="m-meta" id="m-meta"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Modal Bajo Stock -->
<div class="stock-backdrop" id="stock-backdrop" onclick="closeStockModal(event)">
  <div class="stock-sheet" id="stock-sheet">
    <h2>⚠️ Alerta de Bajo Stock</h2>
    <p class="stock-sub">Pocitos · Juan recibirá una notificación por Telegram</p>

    <div class="stock-field">
      <label>Insumo *</label>
      <input type="text" id="stock-insumo" placeholder="Ej: Mix Lechugas, Cream Cheese…" />
    </div>

    <div class="stock-field">
      <label>Nivel de stock</label>
      <div class="stock-levels">
        <button type="button" class="level-btn" data-level="Muy poco" onclick="selectLevel(this)">🟡 Muy poco</button>
        <button type="button" class="level-btn" data-level="Casi sin stock" onclick="selectLevel(this)">🟠 Casi sin stock</button>
        <button type="button" class="level-btn" data-level="Sin stock" onclick="selectLevel(this)">🔴 Sin stock</button>
      </div>
    </div>

    <div class="stock-field">
      <label>Nota adicional <span style="font-weight:400;color:#aaa">(opcional)</span></label>
      <textarea id="stock-nota" rows="2" placeholder="Ej: se usó todo en el servicio del mediodía"></textarea>
    </div>

    <button class="btn-send-stock" id="btn-send-stock" onclick="sendStockAlert()">Enviar alerta</button>
    <button class="btn-cancel-stock" onclick="closeStockModal()">Cancelar</button>
    <div class="stock-status" id="stock-status"></div>
  </div>
</div>

<script>
  const DASHBOARD_URL  = 'https://juanautomatationai.app.n8n.cloud/webhook/wf-dashboard';
  const STOCK_URL      = 'https://juanautomatationai.app.n8n.cloud/webhook/wf-stock-alert';
  const LOCAL_FILTER   = 'Saladbowl Pocitos';
  const LOCAL_NOMBRE   = 'Pocitos';
  const DIAS_CORTO = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const DIAS_LARGO = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MESES      = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  let allOCs = [], today = '', weekOffset = 0, selectedLevel = '';

  function isoDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function isoToday() { return isoDate(new Date()); }
  function formatFechaLarga(iso) {
    if (!iso) return '—';
    const [y,m,d] = iso.split('-').map(Number);
    return DIAS_LARGO[new Date(y,m-1,d).getDay()]+' '+d+' de '+MESES[m-1];
  }
  function getMondayOfWeek(off) {
    const b = new Date(); b.setDate(b.getDate()+off);
    const dow = b.getDay(); b.setDate(b.getDate()-(dow===0?6:dow-1)); b.setHours(0,0,0,0); return b;
  }
  function cardClass(e) { const s=(e||'').toLowerCase(); return s.includes('diferencia')?'diferencias':s==='recibida'?'recibida':s==='pendiente'?'hoy':''; }
  function badgeClass(e) { const s=(e||'').toLowerCase(); if(s==='pendiente')return'badge-pendiente'; if(s==='recibida')return'badge-recibida'; if(s.includes('diferencia'))return'badge-diferencias'; if(s==='borrador')return'badge-borrador'; return'badge-default'; }

  function makeOCCard(oc) {
    const div = document.createElement('div');
    div.className = 'oc-card '+cardClass(oc.estado);
    div.onclick = () => openModal(oc);
    const preview = oc.lineas.slice(0,3).map(l=>`<div>• ${l.producto}: <strong>${l.cantidad_pedida} ${l.unidad}</strong></div>`).join('');
    const more = oc.lineas.length>3?`<div class="more">+${oc.lineas.length-3} más…</div>`:'';
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div class="proveedor">${oc.proveedor}</div>
        <span class="badge ${badgeClass(oc.estado)}">${oc.estado}</span>
      </div>
      <div class="oc-meta">${oc.oc_id} · ${formatFechaLarga(oc.fecha_entrega)}</div>
      <div class="items-preview">${preview}${more}</div>`;
    return div;
  }

  function makeWeekCalendar(ocs) {
    const wrap = document.createDocumentFragment();
    const monday = getMondayOfWeek(weekOffset);
    const days = Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
    const label = document.createElement('p');
    label.className = 'section-label';
    label.textContent = weekOffset===0?'Semana':'Semana próxima';
    wrap.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'week-grid';
    days.forEach(day => {
      const iso = isoDate(day);
      const col = document.createElement('div');
      col.className = 'day-col'+(iso===today?' today':'');
      col.innerHTML = `<div class="day-header">${DIAS_CORTO[day.getDay()]}<span class="day-num">${day.getDate()}</span></div>`;
      const evts = document.createElement('div');
      evts.className = 'day-events';
      const dayOCs = ocs.filter(o=>o.fecha_entrega===iso);
      if (!dayOCs.length) { evts.innerHTML='<div class="empty-day">—</div>'; }
      else dayOCs.forEach(oc=>{ const ev=document.createElement('div'); ev.className='day-event '+cardClass(oc.estado); ev.textContent=oc.proveedor; ev.onclick=()=>openModal(oc); evts.appendChild(ev); });
      col.appendChild(evts);
      grid.appendChild(col);
    });
    wrap.appendChild(grid);
    return wrap;
  }

  function renderContent() {
    const frag = document.createDocumentFragment();
    if (weekOffset===0) {
      const hoy = allOCs.filter(o=>o.fecha_entrega===today);
      const lh = document.createElement('p'); lh.className='section-label today-label'; lh.textContent=hoy.length?'Hoy':'Hoy — sin entregas'; frag.appendChild(lh);
      if (hoy.length) { const g=document.createElement('div'); g.className='hoy-grid'; hoy.forEach(o=>g.appendChild(makeOCCard(o))); frag.appendChild(g); }
      else { const e=document.createElement('div'); e.className='empty-section'; e.textContent='No hay entregas programadas para hoy.'; frag.appendChild(e); }
      const sf=allOCs.filter(o=>!o.fecha_entrega);
      if (sf.length) { const ls=document.createElement('p'); ls.className='section-label'; ls.textContent='Sin fecha de entrega'; frag.appendChild(ls); const g=document.createElement('div'); g.className='hoy-grid'; sf.forEach(o=>g.appendChild(makeOCCard(o))); frag.appendChild(g); }
    }
    frag.appendChild(makeWeekCalendar(allOCs));
    const main=document.getElementById('main-content'); main.innerHTML=''; main.appendChild(frag);
  }

  function switchWeek(off) {
    weekOffset=off;
    document.querySelectorAll('.week-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&off===0)||(i===1&&off===7)));
    renderContent();
  }

  function openModal(oc) {
    document.getElementById('m-proveedor').textContent=oc.proveedor;
    document.getElementById('m-meta').innerHTML=`${oc.oc_id} &nbsp;·&nbsp; ${formatFechaLarga(oc.fecha_entrega)} &nbsp; <span class="badge ${badgeClass(oc.estado)}">${oc.estado}</span>`;
    let body='';
    if (oc.lineas.length) {
      body+='<div class="modal-section"><div class="modal-section-title">Ítems del pedido</div>';
      oc.lineas.forEach(l=>{
        let ch='',cc='';
        if(l.cantidad_recibida!==null){if(l.cantidad_recibida===l.cantidad_pedida){ch=`${l.cantidad_recibida} ${l.unidad} ✓`;cc='recibida';}else{ch=`${l.cantidad_recibida}/${l.cantidad_pedida} ${l.unidad}`;cc='parcial';}}
        else ch=`${l.cantidad_pedida} ${l.unidad}`;
        body+=`<div class="linea-row"><span class="linea-producto">${l.producto}</span><span class="linea-cant ${cc}">${ch}</span></div>`;
      });
      body+='</div>';
    }
    if (oc.notas) body+=`<div class="modal-section"><div class="modal-section-title">Notas</div><div class="notas-box">${oc.notas}</div></div>`;
    if (!body) body='<p style="color:#aaa;font-size:.88rem">Sin detalles adicionales.</p>';
    if (oc.estado.toLowerCase()==='pendiente') body+=`<div style="margin-top:16px"><a href="recepcion.html?oc=${encodeURIComponent(oc.oc_id)}" style="display:block;background:#222;color:#fff;text-align:center;padding:12px;border-radius:10px;text-decoration:none;font-weight:600;font-size:.9rem">Registrar recepción →</a></div>`;
    document.getElementById('modal-body').innerHTML=body;
    document.getElementById('modal-backdrop').classList.add('open');
  }

  function closeModal(e) { if(e&&e.target!==document.getElementById('modal-backdrop'))return; document.getElementById('modal-backdrop').classList.remove('open'); }
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ document.getElementById('modal-backdrop').classList.remove('open'); document.getElementById('stock-backdrop').classList.remove('open'); } });

  // ── Stock Alert ──────────────────────────────────────────────────────────────
  function openStockModal() {
    selectedLevel='';
    document.getElementById('stock-insumo').value='';
    document.getElementById('stock-nota').value='';
    document.getElementById('stock-status').className='stock-status';
    document.querySelectorAll('.level-btn').forEach(b=>b.className='level-btn');
    document.getElementById('btn-send-stock').disabled=false;
    document.getElementById('stock-backdrop').classList.add('open');
  }

  function closeStockModal(e) { if(e&&e.target!==document.getElementById('stock-backdrop'))return; document.getElementById('stock-backdrop').classList.remove('open'); }

  function selectLevel(btn) {
    document.querySelectorAll('.level-btn').forEach(b=>b.className='level-btn');
    selectedLevel=btn.dataset.level;
    const cls=selectedLevel==='Muy poco'?'selected-poco':selectedLevel==='Casi sin stock'?'selected-casi':'selected-sin';
    btn.classList.add(cls);
  }

  async function sendStockAlert() {
    const insumo=document.getElementById('stock-insumo').value.trim();
    const nota=document.getElementById('stock-nota').value.trim();
    const statusDiv=document.getElementById('stock-status');
    const btn=document.getElementById('btn-send-stock');
    if (!insumo) { alert('Indicá el insumo con bajo stock.'); return; }
    if (!selectedLevel) { alert('Seleccioná el nivel de stock.'); return; }
    btn.disabled=true;
    try {
      const res=await fetch(STOCK_URL,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ local:LOCAL_NOMBRE, insumo, nivel:selectedLevel, nota }) });
      if(res.ok){ statusDiv.className='stock-status ok'; statusDiv.textContent='✅ Alerta enviada. Juan fue notificado.'; setTimeout(()=>document.getElementById('stock-backdrop').classList.remove('open'),2000); }
      else throw new Error();
    } catch { statusDiv.className='stock-status err'; statusDiv.textContent='❌ Error al enviar. Intentá de nuevo.'; btn.disabled=false; }
  }

  async function loadData() {
    document.getElementById('main-content').innerHTML='<div class="loader">Cargando órdenes…</div>';
    today=isoToday();
    const now=new Date();
    document.getElementById('top-date').textContent=DIAS_LARGO[now.getDay()]+' '+now.getDate()+' de '+MESES[now.getMonth()]+' '+now.getFullYear();
    try {
      const res=await fetch(DASHBOARD_URL);
      const data=await res.json();
      allOCs=(data.ocs||[]).filter(o=>o.local===LOCAL_FILTER);
      renderContent();
    } catch { document.getElementById('main-content').innerHTML='<div class="empty-section">⚠️ Error al cargar. Tocá "Actualizar" para reintentar.</div>'; }
  }

  loadData();
